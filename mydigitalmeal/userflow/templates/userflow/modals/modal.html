<div class="modal fade mdm-modal"
     id="infoModal"
     data-bs-backdrop="static"
     data-bs-keyboard="false"
     tabindex="-1"
     aria-labelledby="infoModalLabel"
     aria-hidden="true">

  <button class="btn-close-custom" data-bs-dismiss="modal" aria-label="Close">{# djlint:off H023 #}&#x2715;{# djlint:on #}</button>

  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content d-flex d-column align-content-center justify-content-center">
      <div class="modal-body justify-content-center d-flex flex-column">
        {% block modal_content %}{% endblock modal_content %}
      </div>
    </div>
  </div>
</div>
