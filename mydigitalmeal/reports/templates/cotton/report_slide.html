<div class="report-slide {{ slide_classes }}"
     data-slide="{{ slide_nr }}"
     data-intro-hide-delay="{{ intro_hide_delay }}"
     data-content-hide-delay="{{ content_hide_delay }}"
     data-autoplay="{{ autoplay }}">

  <div class="slide-top-content {{ top_classes }}">
    {{ top }}
  </div>

  <div class="slide-intro {{ intro_classes }}"
       data-duration="{{ intro_duration }}">
    {{ intro }}
  </div>

  <div class="slide-content {{ content_classes }}">
    {{ content }}
  </div>

  <div class="slide-outro {{ outro_classes }}"
       data-duration="{{ outro_duration }}">
    {{ outro }}
  </div>

  <div class="slide-bottom-content {{ bottom_classes }}">
    {{ bottom }}
  </div>

</div>
