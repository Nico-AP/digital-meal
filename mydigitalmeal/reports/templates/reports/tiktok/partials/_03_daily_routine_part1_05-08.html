{% load i18n static %}

<c-report-slide
    slide_nr="3"
    intro_duration="50"
    outro_duration="0"
    autoplay="3000"
    content_classes="show-on-top-500"
>
  <c-slot name="intro">
    {% include "reports/animations/alarm.svg" %}
  </c-slot>

  <c-slot name="content">
    <div class="text-black fw-bold">
        <div class="routine-caption routine-5-8-caption">
          {% blocktranslate %}
            Dein Wecker<br />macht TikTok
          {% endblocktranslate %}
        </div>
    </div>
  </c-slot>

  <c-slot name="outro">
  </c-slot>

</c-report-slide>
