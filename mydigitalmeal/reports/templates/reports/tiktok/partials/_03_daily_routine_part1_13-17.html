{% load i18n static %}

<c-report-slide
    slide_nr="3"
    intro_duration="50"
    outro_duration="0"
    autoplay="3500"
    content_classes="show-on-top-500"
>
  <c-slot name="intro">
    {% include "reports/animations/mug.svg" %}
  </c-slot>

  <c-slot name="content">
    <div class="text-black fw-bold">
      <div class="routine-caption routine-13-17-caption">
        {% blocktranslate %}
          Produktive<br />Nachmittage<br />brauchen<br />Pausen
        {% endblocktranslate %}
      </div>
    </div>
  </c-slot>

  <c-slot name="outro">
  </c-slot>

</c-report-slide>
