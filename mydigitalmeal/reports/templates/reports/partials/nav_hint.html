      <div class="swipe-dot"></div>
    </div>
  </div>
  <div class="report-nav-hint-keyboard desktop-only report-nav-hint flex-column align-items-center justify-content-center">

      <svg width="12" height="12" viewBox="0 0 12 12">
        <path d="M6 10 L10 3 L2 3 Z" fill="rgba(255,255,255,0.85)"/>
      </svg>
    </div>
  </div>
</div>
