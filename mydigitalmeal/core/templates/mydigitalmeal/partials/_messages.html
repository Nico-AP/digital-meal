<div class="mdm-message-wrapper">
  <div class="mdm-message-container">
    {% if messages %}
      {% for message in messages %}
        {% if forloop.last %}
          <div class="alert mdm-alert alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endif %}
      {% endfor %}
    {% endif %}
  </div>
</div>
